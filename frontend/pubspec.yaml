name: reminder_app
description: "Aggressive escalating reminder app for Android."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Local Storage
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.15
  path_provider: ^2.1.0
  path: ^1.8.0

  # Networking
  dio: ^5.3.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Background Tasks
  # workmanager removed — using flutter_local_notifications zonedSchedule instead

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.0.0
  firebase_analytics: ^11.0.0
  firebase_remote_config: ^5.0.0

  # UI/UX
  intl: ^0.20.2

  # Utilities
  uuid: ^4.0.0
  timezone: ^0.10.0
  connectivity_plus: ^5.0.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  
  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#3370E5"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/icon.png
  android_12:
    color: "#ffffff"
    image: assets/icon/icon.png
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
